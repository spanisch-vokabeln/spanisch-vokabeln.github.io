<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Spanish flag stripe top -->
  <rect x="0" y="0" width="512" height="72" rx="0" fill="#c60b1e" opacity="0.85"/>
  <rect x="0" y="0" width="512" height="72" rx="96" fill="#c60b1e" opacity="0.85"/>
  <!-- Spanish flag stripe bottom -->
  <rect x="0" y="440" width="512" height="72" fill="#c60b1e" opacity="0.85"/>
  <rect x="0" y="440" width="512" height="72" rx="96" fill="#c60b1e" opacity="0.85"/>
  <!-- Yellow middle band -->
  <rect x="0" y="72" width="512" height="368" fill="#f1bf00" opacity="0.15"/>
  <!-- ES text -->
  <text x="256" y="320" font-family="Arial Black, Arial, sans-serif" font-size="240" font-weight="900" text-anchor="middle" fill="white" letter-spacing="-8">ES</text>
</svg>
